<body class="mc-theme">
  <div class="overlay" style="background-image: url('https://i.imgur.com/2T0D8uU.png');"></div>

  <header>
    <div class="logo">The NetherTeam</div>
    <nav>
      <a href="../index.html">Home</a>

    </nav>

  <section class="container">
    <h1>Rickroll Mod - Download</h1>
    <h2>Choose your loader</h2>

    <div id="download-links"></div>
  </section>

  <footer>
    <p>&copy; 2025 The NetherTeam, AnakamaTH</p>
  </footer>

  <script>
    const downloads = [
      {
        platform: "Modrinth",
        mods: [
          {
            name: "Forge",
            url: "https://modrinth.com/mod/rickroll-mod"
          },
          {
            name: "Fabric",
            url: "https://modrinth.com/mod/rickroll-mod-fabric"
          }
        ]
      }
    ];

    const container = document.getElementById("download-links");

    downloads.forEach(platform => {
      const platformSection = document.createElement("div");
      platformSection.classList.add("platform-section");

      const h3 = document.createElement("h3");
      h3.textContent = platform.platform;
      platformSection.appendChild(h3);

      platform.mods.forEach(mod => {
        const modDiv = document.createElement("div");
        modDiv.classList.add("mod-entry");

        const a = document.createElement("a");
        a.href = mod.url;
        a.target = "_blank";
        a.rel = "noopener noreferrer";
        a.textContent = mod.name;

        modDiv.appendChild(a);
        platformSection.appendChild(modDiv);
      });

      container.appendChild(platformSection);
    });
  </script>
